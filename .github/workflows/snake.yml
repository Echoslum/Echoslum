name: generate animation

on:
  # her 24 saatte bir otomatik çalışır
  schedule:
    - cron: "0 */24 * * *" 
  
  # istediğin zaman manuel başlatmanı sağlar
  workflow_dispatch:
  
  # main branchine her push yapıldığında çalışır
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # github contribution grid yılanını oluşturur
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Echoslum
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
          
      # içeriği (snake.svg) 'output' branchine yükler
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
